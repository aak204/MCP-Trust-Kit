name: MCP Trust Kit
description: Scan a local stdio MCP server, calculate a deterministic surface-risk score, and emit JSON and SARIF reports.

branding:
  icon: 'shield'
  color: 'green'
  
inputs:
  cmd:
    description: Shell-style command used to start the MCP server over stdio.
    required: true
  min-score:
    description: Minimum total score required to pass. Range: 0..100.
    required: false
    default: "0"
  json-out:
    description: Path for the JSON report file.
    required: false
    default: mcp-trust-report.json
  sarif-out:
    description: Path for the SARIF report file.
    required: false
    default: mcp-trust-report.sarif

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install MCP Trust Kit
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        python -m pip install --upgrade pip
        python -m pip install .

    - name: Run MCP Trust Kit scan
      shell: bash
      env:
        MCP_TRUST_CMD: ${{ inputs.cmd }}
        MCP_TRUST_MIN_SCORE: ${{ inputs.min-score }}
        MCP_TRUST_JSON_OUT: ${{ inputs.json-out }}
        MCP_TRUST_SARIF_OUT: ${{ inputs.sarif-out }}
      run: |
        python - <<'PY'
        import os
        import shlex
        import subprocess
        import sys

        raw_cmd = os.environ["MCP_TRUST_CMD"].strip()
        if not raw_cmd:
            print(
                "Input 'cmd' is required. Example: cmd: python path/to/server.py",
                file=sys.stderr,
            )
            raise SystemExit(2)

        server_cmd = shlex.split(raw_cmd)
        cli_cmd = [
            sys.executable,
            "-m",
            "mcp_trust.cli",
            "scan",
            "--min-score",
            os.environ["MCP_TRUST_MIN_SCORE"],
            "--json-out",
            os.environ["MCP_TRUST_JSON_OUT"],
            "--sarif",
            os.environ["MCP_TRUST_SARIF_OUT"],
            "--cmd",
            *server_cmd,
        ]
        raise SystemExit(subprocess.run(cli_cmd, check=False).returncode)
        PY
